<style>
/* ==========================================================================
   Projects Page
   Visual language aligned with Publications
   ========================================================================== */

.projects-intro,
.project-meta,
.project-affiliation,
.project-description,
.project-link-button {
  font-family: "Source Sans 3", "Helvetica Neue", Arial, sans-serif !important;
}

.projects-section-title,
.project-title {
  font-family: "Cormorant Garamond", Georgia, serif !important;
}

/* Intro */
.projects-intro {
  max-width: 760px;
  margin-bottom: 2rem;
  font-size: 0.98rem;
  line-height: 1.65;
  color: #555555;
}

/* Sections */
.projects-section {
  margin-top: 2.6rem;
  margin-bottom: 3.2rem;
  clear: both;
}

.projects-section-header {
  display: flex;
  align-items: center;
  gap: 0.55rem;
  margin-bottom: 1rem;
}

.projects-section-title {
  display: flex;
  align-items: center;
  gap: 0.55rem;
  margin: 0;
  font-size: 1.65rem !important;
  font-weight: 700 !important;
  color: #7A3E3E !important;
}

.projects-count {
  display: inline-flex !important;
  align-items: center !important;
  justify-content: center !important;

  min-height: 1.55rem !important;
  padding: 0.2rem 0.58rem !important;

  border: 1.3px solid #7A3E3E !important;
  border-radius: 3px !important;

  background: #F4EDE4 !important;
  color: #7A3E3E !important;

  font-family: "Source Sans 3", "Helvetica Neue", Arial, sans-serif !important;
  font-size: 0.72rem !important;
  font-weight: 600 !important;
  line-height: 1 !important;
}

/* Vertical project list */
.project-list {
  display: flex;
  flex-direction: column;
  gap: 0.85rem;
}

/* Project card */
.project-card {
  display: block;
  width: 100%;

  border: 1px solid #D8C8BE;
  border-left: 5px solid #7A3E3E;
  border-radius: 8px;

  background: #F4EDE4;
  padding: 1rem 1.05rem;

  transition:
    transform 0.18s ease,
    box-shadow 0.18s ease,
    border-color 0.18s ease;
}

.project-card.project-card-has-links {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 1.35rem;
  align-items: center;
}

.project-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 22px rgba(78, 37, 37, 0.10);
  border-color: #C7AFA6;
  border-left-color: #7A3E3E;
  background: #F4EDE4;
}

.project-card-content {
  min-width: 0;
}

/* Metadata and badges */
.project-meta {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 0.38rem;
  margin-bottom: 0.58rem;
}

.project-badge {
  display: inline-flex !important;
  align-items: center !important;
  justify-content: center !important;

  min-height: 1.55rem !important;
  padding: 0.2rem 0.58rem !important;

  border: 1.3px solid #7A3E3E !important;
  border-radius: 3px !important;

  background: #F4EDE4 !important;
  color: #7A3E3E !important;

  font-family: "Source Sans 3", "Helvetica Neue", Arial, sans-serif !important;
  font-size: 0.72rem !important;
  font-weight: 600 !important;
  line-height: 1 !important;

  text-decoration: none !important;
  box-shadow: none !important;
}

.project-status-current {
  background: #7A3E3E !important;
  color: #F4EDE4 !important;
}

/* Title */
.project-title {
  margin: 0 0 0.38rem 0;
  font-size: 1.34rem !important;
  font-weight: 700 !important;
  line-height: 1.3;
  color: #222222 !important;
}

/* Role and institution */
.project-affiliation {
  margin-bottom: 0.55rem;
  font-size: 0.84rem;
  line-height: 1.45;
  color: #7A3E3E;
  font-weight: 600;
}

.project-affiliation-divider {
  margin: 0 0.3rem;
  color: #B9A79A;
}

.project-description {
  max-width: 790px;
  margin: 0;
  font-size: 0.9rem;
  line-height: 1.52;
  color: #333333;
}

/* Optional external-link area */
.project-links {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  justify-content: center;
  gap: 0.52rem;

  min-width: 150px;
  padding-left: 1.25rem;
  border-left: 1px solid #D8C8BE;
}

.project-link-button,
.project-link-button:visited {
  display: inline-flex !important;
  align-items: center !important;
  justify-content: space-between !important;
  gap: 0.52rem !important;

  min-height: 1.85rem !important;
  padding: 0.34rem 0.7rem !important;

  border: 1.4px solid #7A3E3E !important;
  border-radius: 3px !important;

  background: #F4EDE4 !important;
  color: #7A3E3E !important;

  font-size: 0.76rem !important;
  font-weight: 500 !important;
  line-height: 1 !important;

  text-decoration: none !important;
  box-shadow: none !important;

  transition:
    background 0.18s ease,
    color 0.18s ease,
    border-color 0.18s ease;
}

.project-link-button:hover {
  background: #7A3E3E !important;
  color: #F4EDE4 !important;
  border-color: #7A3E3E !important;
  text-decoration: none !important;
}

.project-link-label {
  color: currentColor !important;
  white-space: nowrap;
}

.project-external-icon {
  display: inline-flex !important;
  align-items: center !important;
  justify-content: center !important;

  width: 1rem !important;
  height: 1rem !important;
  flex: 0 0 auto !important;
}

.project-external-icon svg {
  display: block !important;
  width: 1rem !important;
  height: 1rem !important;

  color: currentColor !important;
  stroke: currentColor !important;
  fill: none !important;

  stroke-width: 1.75 !important;
  stroke-linecap: square !important;
  stroke-linejoin: miter !important;
}

/* ==========================================================================
   Dark mode
   ========================================================================== */

html[data-theme="dark"] .projects-intro,
html[data-theme="dark"] .project-description,
html[data-theme="dark"] .project-affiliation,
html[data-theme="dark"] .project-title,
html[data-theme="dark"] .projects-section-title {
  color: #F4EDE4 !important;
}

html[data-theme="dark"] .project-card {
  background: #7A3E3E !important;
  border-color: rgba(244, 237, 228, 0.48) !important;
  border-left-color: #F4EDE4 !important;
}

html[data-theme="dark"] .project-card:hover {
  background: #7A3E3E !important;
  border-color: #F4EDE4 !important;
  box-shadow: 0 8px 22px rgba(43, 14, 18, 0.28) !important;
}

html[data-theme="dark"] .project-badge,
html[data-theme="dark"] .projects-count {
  background: transparent !important;
  border-color: #F4EDE4 !important;
  color: #F4EDE4 !important;
}

html[data-theme="dark"] .project-status-current {
  background: #F4EDE4 !important;
  border-color: #F4EDE4 !important;
  color: #7A3E3E !important;
}

html[data-theme="dark"] .project-links {
  border-left-color: rgba(244, 237, 228, 0.48) !important;
}

html[data-theme="dark"] .project-link-button,
html[data-theme="dark"] .project-link-button:visited {
  background: transparent !important;
  border-color: #F4EDE4 !important;
  color: #F4EDE4 !important;
}

html[data-theme="dark"] .project-link-button:hover {
  background: #F4EDE4 !important;
  border-color: #F4EDE4 !important;
  color: #7A3E3E !important;
}

/* Responsive */
@media (max-width: 760px) {
  .project-card.project-card-has-links {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 0.85rem;
  }

  .project-links {
    min-width: 0;
    padding-left: 0;
    padding-top: 0.8rem;
    border-left: 0;
    border-top: 1px solid #D8C8BE;
    flex-direction: row;
    flex-wrap: wrap;
    justify-content: flex-start;
  }

  html[data-theme="dark"] .project-links {
    border-top-color: rgba(244, 237, 228, 0.48) !important;
  }

  .project-link-button {
    width: auto;
  }
}
</style>
