<style>
:root {
  --font-serif: "Cormorant Garamond", Georgia, serif;
  --font-sans: "Source Sans 3", "Helvetica Neue", Arial, sans-serif;

  --site-bg: #F4EDE4;
  --site-burgundy: #7A3E3E;
  --site-burgundy-dark: #4E2525;
  --site-border: #D8C8BE;
  --site-muted: #666666;
  --site-text: #222222;
}

/* Site-wide background */
html,
body,
.initial-content,
.page,
.archive {
  background-color: var(--site-bg) !important;
  color: var(--site-text) !important;
}

/* General typography */
body,
.page__content,
.archive__item,
.archive__item-excerpt,
.sidebar,
.author__content,
.author__bio,
.author__urls,
.greedy-nav,
.masthead__menu,
.masthead__menu-item,
.toc,
.page__footer,
input,
textarea,
button {
  font-family: var(--font-sans) !important;
}

/* Serif headings */
h1,
h2,
h3,
h4,
h5,
h6,
.page__title,
.archive__item-title,
.site-title,
.author__name {
  font-family: var(--font-serif) !important;
}

/* Page titles inside pages: archive background, burgundy text */
.page__title {
  display: block !important;
  background-color: transparent !important;
  color: var(--site-burgundy) !important;

  padding: 0 !important;
  border-radius: 0 !important;

  font-family: "Cormorant Garamond", Georgia, serif !important;
  font-size: 2.8rem !important;
  font-weight: 700 !important;
  line-height: 1.1 !important;
  letter-spacing: 0.01em !important;
}

/* Section headings inside pages */
.page__content h2,
.page__content h3,
.page__content h4 {
  color: var(--site-burgundy) !important;
  font-family: var(--font-serif) !important;
  font-weight: 700 !important;
}

/* Homepage accordion / numbered section titles */
.page__content details summary,
.page__content summary,
.page__content .accordion summary,
.page__content details > summary {
  font-family: "Cormorant Garamond", Georgia, serif !important;
  color: var(--site-burgundy) !important;
  font-size: 1.55rem !important;
  font-weight: 700 !important;
  line-height: 1.25 !important;
  letter-spacing: 0.01em !important;
  cursor: pointer !important;
}

.page__content details summary:hover,
.page__content summary:hover {
  color: var(--site-burgundy-dark) !important;
}

.page__content details summary::marker {
  color: var(--site-burgundy) !important;
}

.page__content details p,
.page__content details li,
.page__content details div {
  font-family: "Source Sans 3", "Helvetica Neue", Arial, sans-serif !important;
  color: var(--site-text) !important;
}

/* Main text */
.page__content,
.archive__item-excerpt,
.author__bio,
.sidebar,
.page__footer {
  color: var(--site-text) !important;
}

/* General links outside top navigation */
.page__content a,
.archive__item-title a,
.author__urls a,
.page__footer a {
  color: var(--site-burgundy) !important;
}

.page__content a:hover,
.archive__item-title a:hover,
.author__urls a:hover,
.page__footer a:hover {
  color: var(--site-burgundy-dark) !important;
  text-decoration-color: var(--site-burgundy-dark) !important;
}

/* Full burgundy top bar */
.masthead,
.masthead__inner-wrap,
.masthead__menu,
.greedy-nav,
.greedy-nav .visible-links,
.greedy-nav .visible-links li,
.greedy-nav .visible-links li a,
.greedy-nav .hidden-links,
.greedy-nav .hidden-links li,
.greedy-nav .hidden-links li a {
  background-color: var(--site-burgundy) !important;
  background: var(--site-burgundy) !important;
}

.masthead {
  border-bottom: 1px solid var(--site-burgundy-dark) !important;
  box-shadow: none !important;
}

.masthead__inner-wrap {
  box-shadow: none !important;
  border: none !important;
}

/* Top navigation text */
.masthead a,
.masthead a:visited,
.greedy-nav a,
.greedy-nav a:visited,
.greedy-nav .visible-links a,
.greedy-nav .visible-links a:visited,
.masthead__menu-item a,
.masthead__menu-item a:visited,
.site-title,
.site-title:visited {
  color: var(--site-bg) !important;
  background: transparent !important;
  text-decoration: none !important;
  font-family: var(--font-sans) !important;
  font-weight: 600 !important;
}

/* Site title / name */
.site-title,
.site-title:visited {
  color: var(--site-bg) !important;
  font-family: var(--font-serif) !important;
  font-weight: 700 !important;
  letter-spacing: 0.01em !important;
}

/* Hover in top navigation */
.masthead a:hover,
.greedy-nav a:hover,
.greedy-nav .visible-links a:hover,
.masthead__menu-item a:hover,
.site-title:hover {
  color: #FFFFFF !important;
  background: transparent !important;
}

/* Active underline in top navigation */
.greedy-nav .visible-links a:before {
  background-color: var(--site-bg) !important;
}

/* Dropdown / hidden menu */
.greedy-nav .hidden-links {
  background-color: var(--site-burgundy) !important;
  border: 1px solid var(--site-burgundy-dark) !important;
}

.greedy-nav .hidden-links a {
  color: var(--site-bg) !important;
}

.greedy-nav .hidden-links a:hover {
  color: #FFFFFF !important;
  background-color: var(--site-burgundy-dark) !important;
}

/* Top bar buttons and icons */
.masthead button,
.greedy-nav button,
.search__toggle,
.theme-toggle,
.greedy-nav .greedy-nav__toggle,
button.search__toggle {
  color: var(--site-bg) !important;
  background: transparent !important;
  border: none !important;
}

.masthead button:hover,
.greedy-nav button:hover,
.search__toggle:hover,
.theme-toggle:hover,
.greedy-nav .greedy-nav__toggle:hover,
button.search__toggle:hover {
  color: #FFFFFF !important;
  background: transparent !important;
}

.masthead svg,
.greedy-nav svg,
.search__toggle svg,
.theme-toggle svg {
  fill: var(--site-bg) !important;
  color: var(--site-bg) !important;
}

.masthead::before,
.masthead::after,
.greedy-nav::before,
.greedy-nav::after {
  background: var(--site-burgundy) !important;
}

/* Sidebar */
.sidebar {
  background-color: transparent !important;
}

.author__name {
  color: var(--site-burgundy) !important;
  font-family: var(--font-serif) !important;
  font-weight: 700 !important;
}

.author__bio,
.author__urls {
  font-family: var(--font-sans) !important;
}

.author__avatar img {
  border: 2px solid var(--site-border) !important;
}

.author__urls-wrapper button {
  background-color: var(--site-bg) !important;
  color: var(--site-burgundy) !important;
  border: 1px solid var(--site-border) !important;
}

.author__urls-wrapper button:hover {
  background-color: var(--site-burgundy) !important;
  color: #ffffff !important;
  border-color: var(--site-burgundy) !important;
}

/* Footer */
.page__footer {
  background-color: var(--site-bg) !important;
  border-top: 1px solid var(--site-border) !important;
}

.page__footer a {
  color: var(--site-burgundy) !important;
}

.page__footer a:hover {
  color: var(--site-burgundy-dark) !important;
}

/* Archive lists and original theme elements */
.archive__item {
  border-bottom-color: var(--site-border) !important;
}

.archive__item-title {
  color: var(--site-burgundy) !important;
}

/* Horizontal rules */
hr {
  border-color: var(--site-border) !important;
}

/* Buttons used by the theme */
.btn,
.btn--primary,
.page__content .btn {
  background-color: var(--site-burgundy) !important;
  color: #ffffff !important;
  border-color: var(--site-burgundy) !important;
}

.btn:hover,
.btn--primary:hover,
.page__content .btn:hover {
  background-color: var(--site-burgundy-dark) !important;
  color: #ffffff !important;
  border-color: var(--site-burgundy-dark) !important;
}

/* Publication-specific typography */
.pub-section-title,
.pub-title {
  font-family: var(--font-serif) !important;
}

.publications-intro,
.pub-meta,
.pub-description,
.pub-links a,
.pub-year,
.pub-index-badge,
.pub-count,
.publication-back-link,
.citation-box,
.keyword-pill {
  font-family: var(--font-sans) !important;
}

/* ==========================================================================
   Mobile icon navigation
   ========================================================================== */

.mobile-section-nav {
  display: none;
}

@media (max-width: 650px) {

  /*
     Mobile masthead background:
     archive cream background with burgundy typography.
     Desktop masthead remains unchanged.
  */
  .masthead,
  .masthead__inner-wrap,
  .masthead__menu,
  .greedy-nav,
  .greedy-nav .visible-links,
  .greedy-nav .visible-links li,
  .greedy-nav .visible-links li a,
  .mobile-section-nav,
  .mobile-section-nav ul,
  .mobile-section-nav li,
  .mobile-section-nav li a {
    background-color: var(--site-bg) !important;
    background: var(--site-bg) !important;
  }

  .masthead {
    border-bottom: 1px solid var(--site-border) !important;
  }

  .masthead::before,
  .masthead::after,
  .greedy-nav::before,
  .greedy-nav::after {
    background: var(--site-border) !important;
  }

  .masthead__inner-wrap {
    padding: 0 !important;
  }

  /*
     First mobile row:
     name on the left, theme button on the right.
  */
  .greedy-nav {
    width: 100%;
    min-width: 0;
    padding: 0 1.1rem;
  }

  .greedy-nav .visible-links {
    display: flex !important;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    height: 3.6rem;
  }

  .greedy-nav .visible-links > .masthead__menu-item:not(.persist),
  .greedy-nav button,
  .greedy-nav .hidden-links {
    display: none !important;
  }

  .greedy-nav .visible-links .masthead__menu-item--lg {
    flex: 1 1 auto;
    min-width: 0;
    padding-right: 0.5rem;
  }

  .greedy-nav .visible-links .masthead__menu-item--lg a {
    display: block;
    margin: 0 !important;
    padding: 0 !important;

    font-family: var(--font-serif) !important;
    font-size: 1.28rem !important;
    font-weight: 700 !important;
    line-height: 1 !important;
    letter-spacing: 0.01em;

    color: var(--site-burgundy) !important;

    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .greedy-nav .visible-links .masthead__menu-item--lg.selected a {
    border-bottom: none !important;
  }

  .greedy-nav .visible-links > .persist a::before {
    display: none !important;
  }

  #theme-toggle {
    flex: 0 0 auto;
  }

  #theme-toggle a {
    width: auto !important;
    margin: 0 !important;
    padding: 0.2rem 0 0.2rem 0.65rem !important;
    color: var(--site-burgundy) !important;
  }

  #theme-toggle i,
  #theme-icon {
    color: var(--site-burgundy) !important;
    font-size: 1.15rem !important;
  }

  /*
     Second mobile row:
     icon-based section navigation.
  */
  .mobile-section-nav {
    display: block;
    width: 100%;
    border-top: 1px solid var(--site-border);
    border-bottom: 1px solid var(--site-border);
  }

  .mobile-section-links {
    display: flex;
    align-items: stretch;
    justify-content: space-between;

    width: 100%;
    margin: 0;
    padding: 0 0.35rem;
    list-style: none;
  }

  .mobile-section-item {
    position: relative;
    flex: 1 1 20%;
    min-width: 0;
    list-style: none;
  }

  .mobile-section-item a,
  .masthead .mobile-section-item a,
  .masthead .mobile-section-item a:visited {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.34rem;

    height: 4.55rem;
    margin: 0 !important;
    padding: 0.62rem 0.12rem 0.55rem !important;

    color: var(--site-burgundy) !important;
    text-decoration: none !important;
  }

  .mobile-section-item i {
    display: block;
    color: var(--site-burgundy) !important;
    font-size: 1.22rem;
    line-height: 1;
  }

  .mobile-section-item span {
    display: block;
    font-family: var(--font-sans) !important;
    font-size: 0.73rem;
    font-weight: 500;
    line-height: 1;
    color: var(--site-burgundy) !important;
    white-space: nowrap;
  }

  .mobile-section-item a::before {
    display: none !important;
  }

  .mobile-section-item.selected::after {
    content: "";
    position: absolute;
    left: 18%;
    right: 18%;
    bottom: 0;
    height: 3px;
    border-radius: 3px 3px 0 0;
    background-color: var(--site-burgundy);
  }

  .mobile-section-item.selected a {
    pointer-events: none;
    cursor: default;
  }

  .mobile-section-item.selected span {
    font-weight: 700;
  }

  .mobile-section-item a:hover,
  .mobile-section-item a:hover i,
  .mobile-section-item a:hover span {
    color: var(--site-burgundy-dark) !important;
  }
}
  
</style>
