{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<!-- Site-wide typography: Cormorant Garamond + Source Sans 3 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --font-serif: "Cormorant Garamond", Georgia, serif;
  --font-sans: "Source Sans 3", "Helvetica Neue", Arial, sans-serif;
}

/* General body text */
body,
.page__content,
.archive__item,
.archive__item-excerpt,
.sidebar,
.author__content,
.author__bio,
.author__urls,
.greedy-nav,
.masthead__menu,
.masthead__menu-item,
.toc,
.page__footer,
input,
textarea,
button {
  font-family: var(--font-sans) !important;
}

/* Main titles and headings */
h1,
h2,
h3,
h4,
h5,
h6,
.page__title,
.archive__item-title,
.site-title,
.author__name {
  font-family: var(--font-serif) !important;
}

/* Site title / name */
.site-title {
  font-weight: 700 !important;
  letter-spacing: 0.01em;
}

/* Page titles */
.page__title {
  font-weight: 700 !important;
  letter-spacing: 0.01em;
}

/* Section headings */
.page__content h2,
.page__content h3 {
  font-weight: 700 !important;
}

/* Navigation */
.masthead__menu-item,
.masthead__menu-item a,
.greedy-nav a {
  font-family: var(--font-sans) !important;
  font-weight: 500 !important;
}

/* Sidebar profile text */
.author__name {
  font-weight: 700 !important;
}

.author__bio,
.author__urls {
  font-family: var(--font-sans) !important;
}

/* Publication-specific elements */
.pub-section-title,
.pub-title {
  font-family: var(--font-serif) !important;
}

.publications-intro,
.pub-meta,
.pub-description,
.pub-links a,
.pub-year,
.pub-index-badge,
.pub-count,
.publication-back-link,
.citation-box,
.keyword-pill {
  font-family: var(--font-sans) !important;
}
</style>

<!-- end custom head snippets -->
