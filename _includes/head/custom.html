<style>
:root {
  --font-serif: "Cormorant Garamond", Georgia, serif;
  --font-sans: "Source Sans 3", "Helvetica Neue", Arial, sans-serif;

  --site-bg: #F4EDE4;
  --site-burgundy: #7A3E3E;
  --site-burgundy-dark: #4E2525;
  --site-border: #D8C8BE;
  --site-muted: #666666;
  --site-text: #222222;
}

/* Site-wide background */
html,
body,
.initial-content,
.page,
.archive {
  background-color: var(--site-bg) !important;
  color: var(--site-text) !important;
}

/* General typography */
body,
.page__content,
.archive__item,
.archive__item-excerpt,
.sidebar,
.author__content,
.author__bio,
.author__urls,
.greedy-nav,
.masthead__menu,
.masthead__menu-item,
.toc,
.page__footer,
input,
textarea,
button {
  font-family: var(--font-sans) !important;
}

/* Serif headings */
h1,
h2,
h3,
h4,
h5,
h6,
.page__title,
.archive__item-title,
.site-title,
.author__name {
  font-family: var(--font-serif) !important;
}

/* Page titles inside pages: archive background, burgundy text */
.page__title {
  display: block !important;
  background-color: transparent !important;
  color: var(--site-burgundy) !important;

  padding: 0 !important;
  border-radius: 0 !important;

  font-family: "Cormorant Garamond", Georgia, serif !important;
  font-size: 2.8rem !important;
  font-weight: 700 !important;
  line-height: 1.1 !important;
  letter-spacing: 0.01em !important;
}

/* Section headings inside pages */
.page__content h2,
.page__content h3,
.page__content h4 {
  color: var(--site-burgundy) !important;
  font-family: var(--font-serif) !important;
  font-weight: 700 !important;
}

/* Homepage accordion / numbered section titles */
.page__content details summary,
.page__content summary,
.page__content .accordion summary,
.page__content details > summary {
  font-family: "Cormorant Garamond", Georgia, serif !important;
  color: var(--site-burgundy) !important;
  font-size: 1.55rem !important;
  font-weight: 700 !important;
  line-height: 1.25 !important;
  letter-spacing: 0.01em !important;
  cursor: pointer !important;
}

.page__content details summary:hover,
.page__content summary:hover {
  color: var(--site-burgundy-dark) !important;
}

.page__content details summary::marker {
  color: var(--site-burgundy) !important;
}

.page__content details p,
.page__content details li,
.page__content details div {
  font-family: "Source Sans 3", "Helvetica Neue", Arial, sans-serif !important;
  color: var(--site-text) !important;
}

/* Main text */
.page__content,
.archive__item-excerpt,
.author__bio,
.sidebar,
.page__footer {
  color: var(--site-text) !important;
}

/* General links outside top navigation */
.page__content a,
.archive__item-title a,
.author__urls a,
.page__footer a {
  color: var(--site-burgundy) !important;
}

.page__content a:hover,
.archive__item-title a:hover,
.author__urls a:hover,
.page__footer a:hover {
  color: var(--site-burgundy-dark) !important;
  text-decoration-color: var(--site-burgundy-dark) !important;
}

/* Full burgundy top bar */
.masthead,
.masthead__inner-wrap,
.masthead__menu,
.greedy-nav,
.greedy-nav .visible-links,
.greedy-nav .visible-links li,
.greedy-nav .visible-links li a,
.greedy-nav .hidden-links,
.greedy-nav .hidden-links li,
.greedy-nav .hidden-links li a {
  background-color: var(--site-burgundy) !important;
  background: var(--site-burgundy) !important;
}

.masthead {
  border-bottom: 1px solid var(--site-burgundy-dark) !important;
  box-shadow: none !important;
}

.masthead__inner-wrap {
  box-shadow: none !important;
  border: none !important;
}

/* Top navigation text */
.masthead a,
.masthead a:visited,
.greedy-nav a,
.greedy-nav a:visited,
.greedy-nav .visible-links a,
.greedy-nav .visible-links a:visited,
.masthead__menu-item a,
.masthead__menu-item a:visited,
.site-title,
.site-title:visited {
  color: var(--site-bg) !important;
  background: transparent !important;
  text-decoration: none !important;
  font-family: var(--font-sans) !important;
  font-weight: 600 !important;
}

/* Site title / name */
.site-title,
.site-title:visited {
  color: var(--site-bg) !important;
  font-family: var(--font-serif) !important;
  font-weight: 700 !important;
  letter-spacing: 0.01em !important;
}

/* Hover in top navigation */
.masthead a:hover,
.greedy-nav a:hover,
.greedy-nav .visible-links a:hover,
.masthead__menu-item a:hover,
.site-title:hover {
  color: #FFFFFF !important;
  background: transparent !important;
}

/* Active underline in top navigation */
.greedy-nav .visible-links a:before {
  background-color: var(--site-bg) !important;
}

/* Dropdown / hidden menu */
.greedy-nav .hidden-links {
  background-color: var(--site-burgundy) !important;
  border: 1px solid var(--site-burgundy-dark) !important;
}

.greedy-nav .hidden-links a {
  color: var(--site-bg) !important;
}

.greedy-nav .hidden-links a:hover {
  color: #FFFFFF !important;
  background-color: var(--site-burgundy-dark) !important;
}

/* Top bar buttons and icons */
.masthead button,
.greedy-nav button,
.search__toggle,
.theme-toggle,
.greedy-nav .greedy-nav__toggle,
button.search__toggle {
  color: var(--site-bg) !important;
  background: transparent !important;
  border: none !important;
}

.masthead button:hover,
.greedy-nav button:hover,
.search__toggle:hover,
.theme-toggle:hover,
.greedy-nav .greedy-nav__toggle:hover,
button.search__toggle:hover {
  color: #FFFFFF !important;
  background: transparent !important;
}

.masthead svg,
.greedy-nav svg,
.search__toggle svg,
.theme-toggle svg {
  fill: var(--site-bg) !important;
  color: var(--site-bg) !important;
}

.masthead::before,
.masthead::after,
.greedy-nav::before,
.greedy-nav::after {
  background: var(--site-burgundy) !important;
}

/* Sidebar */
.sidebar {
  background-color: transparent !important;
}

.author__name {
  color: var(--site-burgundy) !important;
  font-family: var(--font-serif) !important;
  font-weight: 700 !important;
}

.author__bio,
.author__urls {
  font-family: var(--font-sans) !important;
}

.author__avatar img {
  border: 2px solid var(--site-border) !important;
}

.author__urls-wrapper button {
  background-color: var(--site-bg) !important;
  color: var(--site-burgundy) !important;
  border: 1px solid var(--site-border) !important;
}

.author__urls-wrapper button:hover {
  background-color: var(--site-burgundy) !important;
  color: #ffffff !important;
  border-color: var(--site-burgundy) !important;
}

/* Footer */
.page__footer {
  background-color: var(--site-bg) !important;
  border-top: 1px solid var(--site-border) !important;
}

.page__footer a {
  color: var(--site-burgundy) !important;
}

.page__footer a:hover {
  color: var(--site-burgundy-dark) !important;
}

/* Archive lists and original theme elements */
.archive__item {
  border-bottom-color: var(--site-border) !important;
}

.archive__item-title {
  color: var(--site-burgundy) !important;
}

/* Horizontal rules */
hr {
  border-color: var(--site-border) !important;
}

/* Buttons used by the theme */
.btn,
.btn--primary,
.page__content .btn {
  background-color: var(--site-burgundy) !important;
  color: #ffffff !important;
  border-color: var(--site-burgundy) !important;
}

.btn:hover,
.btn--primary:hover,
.page__content .btn:hover {
  background-color: var(--site-burgundy-dark) !important;
  color: #ffffff !important;
  border-color: var(--site-burgundy-dark) !important;
}

/* Publication-specific typography */
.pub-section-title,
.pub-title {
  font-family: var(--font-serif) !important;
}

.publications-intro,
.pub-meta,
.pub-description,
.pub-links a,
.pub-year,
.pub-index-badge,
.pub-count,
.publication-back-link,
.citation-box,
.keyword-pill {
  font-family: var(--font-sans) !important;
}

/* ==========================================================================
   Mobile icon navigation
   Desktop remains unchanged
   ========================================================================== */

/* Never show the mobile menu on desktop */
nav.mobile-section-nav,
.mobile-section-nav {
  display: none !important;
}

@media screen and (max-width: 650px) {

  /*
     The masthead now has two mobile rows:
     1. Site title + theme icon
     2. Icon navigation

     Since the masthead is fixed, the page must begin below both rows.
  */
  body {
    padding-top: 7.65rem !important;
  }

  /*
     Mobile masthead palette:
     burgundy background, archive cream text and icons.
  */
  .masthead,
  .masthead__inner-wrap,
  .masthead__menu,
  .greedy-nav,
  .greedy-nav .visible-links,
  .greedy-nav .visible-links li,
  .greedy-nav .visible-links li a,
  nav.mobile-section-nav,
  .mobile-section-nav,
  .mobile-section-nav ul,
  .mobile-section-nav li,
  .mobile-section-nav li a {
    background-color: var(--site-burgundy) !important;
    background: var(--site-burgundy) !important;
  }

  .masthead {
    border-bottom: 1px solid rgba(244, 237, 228, 0.38) !important;
    box-shadow: none !important;
  }

  .masthead::after {
    background: rgba(244, 237, 228, 0.38) !important;
  }

  .masthead__inner-wrap {
    padding: 0 !important;
  }

  /*
     First row:
     full name on the left, theme toggle on the right.
  */
  .greedy-nav {
    width: 100%;
    min-width: 0 !important;
    padding: 0 1rem !important;
  }

  .greedy-nav .visible-links {
    display: flex !important;
    align-items: center !important;
    justify-content: space-between !important;
    width: 100% !important;
    height: 3.2rem !important;
  }

  /*
     Hide the ordinary desktop rubric links and hamburger only on mobile.
     The icon menu below replaces them.
  */
  .greedy-nav .visible-links > .desktop-menu-link,
  .greedy-nav button,
  .greedy-nav .hidden-links {
    display: none !important;
  }

  .greedy-nav .visible-links .masthead__menu-item--lg {
    display: block !important;
    flex: 1 1 auto !important;
    min-width: 0 !important;
    padding-right: 0.75rem !important;
    background: var(--site-burgundy) !important;
  }

  .greedy-nav .visible-links .masthead__menu-item--lg a {
    display: block !important;
    margin: 0 !important;
    padding: 0.18rem 0 0.28rem !important;
    font-family: var(--font-serif) !important;
    font-size: 1.28rem !important;
    font-weight: 700 !important;
    line-height: 1.32 !important;
    letter-spacing: 0.01em !important;
    color: var(--site-bg) !important;
    background: var(--site-burgundy) !important;
    overflow: hidden !important;
    text-overflow: ellipsis !important;
    white-space: nowrap !important;
  }

  .greedy-nav .visible-links .masthead__menu-item--lg.selected a {
    border-bottom: none !important;
    pointer-events: auto !important;
  }

  .greedy-nav .visible-links a::before {
    display: none !important;
  }

  #theme-toggle {
    display: block !important;
    flex: 0 0 auto !important;
    background: var(--site-burgundy) !important;
  }

  #theme-toggle a {
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    width: auto !important;
    margin: 0 !important;
    padding: 0.2rem 0 0.2rem 0.6rem !important;
    color: var(--site-bg) !important;
    background: var(--site-burgundy) !important;
  }

  #theme-toggle i,
  #theme-icon {
    color: var(--site-bg) !important;
    font-size: 1.05rem !important;
  }

  /*
     Second row:
     mobile-only icon navigation.
  */
  nav.mobile-section-nav,
  .mobile-section-nav {
    display: block !important;
    width: 100% !important;
    height: 4.35rem !important;
    border-top: 1px solid rgba(244, 237, 228, 0.28) !important;
    background: var(--site-burgundy) !important;
    overflow: hidden !important;
  }

  .mobile-section-links {
    display: flex !important;
    align-items: stretch !important;
    justify-content: space-around !important;
    width: 100% !important;
    height: 100% !important;
    margin: 0 !important;
    padding: 0 0.25rem !important;
    list-style: none !important;
  }

  .mobile-section-item {
    position: relative !important;
    display: block !important;
    flex: 1 1 20% !important;
    min-width: 0 !important;
    margin: 0 !important;
    list-style: none !important;
    background: var(--site-burgundy) !important;
  }

  .mobile-section-item a,
  .masthead .mobile-section-item a,
  .masthead .mobile-section-item a:visited {
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
    justify-content: center !important;
    gap: 0.32rem !important;

    width: 100% !important;
    height: 4.35rem !important;
    margin: 0 !important;
    padding: 0.5rem 0.1rem 0.45rem !important;

    color: var(--site-bg) !important;
    background: var(--site-burgundy) !important;
    text-decoration: none !important;
  }

  .mobile-section-item i {
    display: block !important;
    color: var(--site-bg) !important;
    font-size: 1.18rem !important;
    line-height: 1 !important;
  }

  .mobile-section-item span {
    display: block !important;
    font-family: var(--font-sans) !important;
    font-size: 0.7rem !important;
    font-weight: 500 !important;
    line-height: 1 !important;
    color: var(--site-bg) !important;
    white-space: nowrap !important;
  }

  .mobile-section-item a::before {
    display: none !important;
  }

  .mobile-section-item.selected::after {
    content: "" !important;
    position: absolute !important;
    left: 22% !important;
    right: 22% !important;
    bottom: 0 !important;
    height: 2px !important;
    background: var(--site-bg) !important;
  }

  .mobile-section-item.selected a {
    pointer-events: none !important;
    cursor: default !important;
  }

  .mobile-section-item.selected span {
    font-weight: 700 !important;
  }

  .mobile-section-item a:hover,
  .mobile-section-item a:hover i,
  .mobile-section-item a:hover span {
    color: #ffffff !important;
  }
}

/* ==========================================================================
   Desktop masthead alignment
   ========================================================================== */

@media screen and (min-width: 651px) {

  .masthead .greedy-nav {
    width: 100% !important;
    min-width: 0 !important;
  }

  .masthead .greedy-nav .visible-links {
    display: flex !important;
    align-items: center !important;
    width: 100% !important;
  }

  /* Site title remains on the left */
  .masthead .greedy-nav .masthead__menu-item--lg {
    margin-right: auto !important;
    padding-right: 1.5rem !important;
  }

  /* Rubrics align on the right */
  .masthead .greedy-nav .desktop-menu-link {
    flex: 0 0 auto !important;
  }

  /* Theme toggle remains at far right */
  .masthead .greedy-nav #theme-toggle {
    flex: 0 0 auto !important;
    margin-left: 0.35rem !important;
  }

  /*
     Hamburger is not needed on desktop because all desktop
     navigation items are preserved in the visible navigation.
  */
  .masthead .greedy-nav > button,
  .masthead .greedy-nav .hidden-links {
    display: none !important;
  }

  /*
     Mobile navigation must never appear on desktop.
  */
  .masthead .mobile-section-nav {
    display: none !important;
  }
}

/* ==========================================================================
   Burgundy dark mode
   Triggered by the existing theme toggle button
   ========================================================================== */

html[data-theme="dark"] {
  --site-bg: #7A3E3E;
  --site-text: #F4EDE4;
  --site-muted: #F4EDE4;
  --site-border: rgba(244, 237, 228, 0.42);
  --site-burgundy: #F4EDE4;
  --site-burgundy-dark: #FFFFFF;

  --global-bg-color: #7A3E3E;
  --global-footer-bg-color: #7A3E3E;
  --global-border-color: rgba(244, 237, 228, 0.42);
  --global-dark-border-color: rgba(244, 237, 228, 0.65);
  --global-link-color: #F4EDE4;
  --global-link-color-hover: #FFFFFF;
  --global-link-color-visited: #F4EDE4;
  --global-masthead-link-color: #F4EDE4;
  --global-masthead-link-color-hover: #FFFFFF;
  --global-text-color: #F4EDE4;
  --global-text-color-light: #F4EDE4;
}

/* Whole-page dark background */
html[data-theme="dark"],
html[data-theme="dark"] body,
html[data-theme="dark"] .initial-content,
html[data-theme="dark"] .page,
html[data-theme="dark"] .archive,
html[data-theme="dark"] .sidebar,
html[data-theme="dark"] .page__footer {
  background-color: #7A3E3E !important;
  color: #F4EDE4 !important;
}

/* General text and headings */
html[data-theme="dark"] body,
html[data-theme="dark"] p,
html[data-theme="dark"] li,
html[data-theme="dark"] span,
html[data-theme="dark"] .page__content,
html[data-theme="dark"] .archive__item-excerpt,
html[data-theme="dark"] .author__bio,
html[data-theme="dark"] .author__urls,
html[data-theme="dark"] .page__footer,
html[data-theme="dark"] .teaching-intro,
html[data-theme="dark"] .pub-meta,
html[data-theme="dark"] .pub-description {
  color: #F4EDE4 !important;
}

html[data-theme="dark"] h1,
html[data-theme="dark"] h2,
html[data-theme="dark"] h3,
html[data-theme="dark"] h4,
html[data-theme="dark"] h5,
html[data-theme="dark"] h6,
html[data-theme="dark"] .page__title,
html[data-theme="dark"] .pub-section-title,
html[data-theme="dark"] .pub-title,
html[data-theme="dark"] .course-title,
html[data-theme="dark"] .author__name,
html[data-theme="dark"] .archive__item-title,
html[data-theme="dark"] .page__content details summary {
  color: #F4EDE4 !important;
}

/* Links */
html[data-theme="dark"] .page__content a,
html[data-theme="dark"] .archive__item-title a,
html[data-theme="dark"] .author__urls a,
html[data-theme="dark"] .page__footer a,
html[data-theme="dark"] .publication-back-link a,
html[data-theme="dark"] .view-all a {
  color: #F4EDE4 !important;
}

html[data-theme="dark"] .page__content a:hover,
html[data-theme="dark"] .archive__item-title a:hover,
html[data-theme="dark"] .author__urls a:hover,
html[data-theme="dark"] .page__footer a:hover,
html[data-theme="dark"] .publication-back-link a:hover,
html[data-theme="dark"] .view-all a:hover {
  color: #FFFFFF !important;
  text-decoration-color: #FFFFFF !important;
}

/* Masthead: stays burgundy, text/icons become archive cream */
html[data-theme="dark"] .masthead,
html[data-theme="dark"] .masthead__inner-wrap,
html[data-theme="dark"] .masthead__menu,
html[data-theme="dark"] .greedy-nav,
html[data-theme="dark"] .greedy-nav .visible-links,
html[data-theme="dark"] .greedy-nav .visible-links li,
html[data-theme="dark"] .greedy-nav .hidden-links,
html[data-theme="dark"] .mobile-section-nav,
html[data-theme="dark"] .mobile-section-links,
html[data-theme="dark"] .mobile-section-item {
  background-color: #7A3E3E !important;
  background: #7A3E3E !important;
}

html[data-theme="dark"] .masthead a,
html[data-theme="dark"] .masthead a:visited,
html[data-theme="dark"] .greedy-nav a,
html[data-theme="dark"] .greedy-nav a:visited,
html[data-theme="dark"] .site-title,
html[data-theme="dark"] .site-title:visited,
html[data-theme="dark"] .mobile-section-item a,
html[data-theme="dark"] .mobile-section-item span,
html[data-theme="dark"] .mobile-section-item i,
html[data-theme="dark"] #theme-toggle,
html[data-theme="dark"] #theme-toggle a,
html[data-theme="dark"] #theme-toggle i,
html[data-theme="dark"] #theme-icon {
  color: #F4EDE4 !important;
  background-color: #7A3E3E !important;
  background: #7A3E3E !important;
}

html[data-theme="dark"] .masthead a:hover,
html[data-theme="dark"] .greedy-nav a:hover,
html[data-theme="dark"] .mobile-section-item a:hover,
html[data-theme="dark"] .mobile-section-item a:hover span,
html[data-theme="dark"] .mobile-section-item a:hover i,
html[data-theme="dark"] #theme-toggle:hover i {
  color: #FFFFFF !important;
}

html[data-theme="dark"] .greedy-nav .visible-links a::before,
html[data-theme="dark"] .mobile-section-item.selected::after {
  background-color: #F4EDE4 !important;
}

/* Theme button */
#theme-toggle,
#theme-toggle a {
  cursor: pointer !important;
}

#theme-toggle i,
#theme-icon {
  transition: color 0.18s ease, transform 0.18s ease;
}

#theme-toggle:hover i,
#theme-toggle:hover #theme-icon {
  transform: rotate(-12deg);
}

html[data-theme="dark"] #theme-toggle:hover i,
html[data-theme="dark"] #theme-toggle:hover #theme-icon {
  transform: rotate(12deg);
}

/* Sidebar and Follow button */
html[data-theme="dark"] .author__avatar img {

<script>
(function () {
  function initialiseMobileFollowMenu() {
    var wrapper = document.querySelector(".author__urls-wrapper");
    var button = wrapper ? wrapper.querySelector("button") : null;
    var menu = wrapper ? wrapper.querySelector(".author__urls.social-icons") : null;

    if (!wrapper || !button || !menu) return;

    button.setAttribute("type", "button");
    button.setAttribute("aria-expanded", "false");
    button.setAttribute("aria-controls", "mobile-follow-links");

    menu.id = "mobile-follow-links";

    button.addEventListener("click", function (event) {
      if (window.innerWidth > 924) return;

      event.preventDefault();
      event.stopImmediatePropagation();

      var isOpen = wrapper.classList.toggle("follow-menu-open");
      button.classList.toggle("open", isOpen);
      button.setAttribute("aria-expanded", isOpen ? "true" : "false");
    }, true);

    document.addEventListener("click", function (event) {
      if (window.innerWidth > 924) return;

      if (!wrapper.contains(event.target)) {
        wrapper.classList.remove("follow-menu-open");
        button.classList.remove("open");
        button.setAttribute("aria-expanded", "false");
      }
    });

    window.addEventListener("resize", function () {
      if (window.innerWidth > 924) {
        wrapper.classList.remove("follow-menu-open");
        button.classList.remove("open");
        button.setAttribute("aria-expanded", "false");
      }
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initialiseMobileFollowMenu);
  } else {
    initialiseMobileFollowMenu();
  }
})();
</script>

<script>
(function () {
  var DARK = "dark";
  var LIGHT = "light";

  function applyTheme(theme) {
    var html = document.documentElement;
    var icon = document.getElementById("theme-icon");
    var isDark = theme === DARK;

    if (isDark) {
      html.setAttribute("data-theme", "dark");
    } else {
      html.removeAttribute("data-theme");
    }

    if (icon) {
      icon.classList.toggle("fa-sun", !isDark);
      icon.classList.toggle("fa-moon", isDark);
      icon.setAttribute("title", isDark ? "switch to light mode" : "switch to dark mode");
    }

    try {
      localStorage.setItem("theme", theme);
    } catch (error) {
      /* localStorage unavailable: theme still works for this page view */
    }
  }

  function getSavedTheme() {
    try {
      return localStorage.getItem("theme");
    } catch (error) {
      return null;
    }
  }

  function initialiseThemeToggle() {
    var toggle = document.getElementById("theme-toggle");
    if (!toggle) return;

    var trigger = toggle.querySelector("a") || toggle;
    var savedTheme = getSavedTheme();

    if (savedTheme === DARK || savedTheme === LIGHT) {
      applyTheme(savedTheme);
    }

    trigger.setAttribute("role", "button");
    trigger.setAttribute("tabindex", "0");
    trigger.setAttribute("aria-label", "Toggle colour theme");

    function activateThemeToggle(event) {
      event.preventDefault();
      event.stopImmediatePropagation();

      var currentlyDark =
        document.documentElement.getAttribute("data-theme") === DARK;

      applyTheme(currentlyDark ? LIGHT : DARK);
    }

    toggle.addEventListener("click", activateThemeToggle, true);

    trigger.addEventListener("keydown", function (event) {
      if (event.key === "Enter" || event.key === " ") {
        activateThemeToggle(event);
      }
    }, true);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initialiseThemeToggle);
  } else {
    initialiseThemeToggle();
  }
})();
</script>
